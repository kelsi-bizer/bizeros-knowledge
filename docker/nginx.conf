server {
    # Port 80 is what the host publishes via `-p 127.0.0.1:8080:80`
    # (UI access through an SSH tunnel). Port 8080 is also served so that
    # other containers on the same Docker network can reach the brain at
    # http://bizerbrain:8080 — the same URL used in every example and the
    # code default. Both ports serve the identical app; this removes the
    # "which port from a container" footgun entirely.
    listen 80;
    listen [::]:80;
    listen 8080;
    listen [::]:8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Match file-api's default MAX_BODY_BYTES (25 MB).
    client_max_body_size 25M;

    # /api/* is served by the file-api sidecar on 127.0.0.1:3000.
    # SSE-friendly: HTTP/1.1, no buffering, long read timeout.
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_buffering off;
        proxy_cache off;
        proxy_set_header Connection '';
        proxy_read_timeout 24h;
        proxy_send_timeout 24h;
    }

    # Hash-routed SPA: any unknown path falls back to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
