# BizerBrain — single-command deployment.
#
#   docker compose up -d
#
# After this is up:
#   - The web UI is on the host at http://127.0.0.1:8080
#     (reach it from your laptop with: ssh -L 8080:localhost:8080 user@vm)
#   - Agents in other containers reach the brain at http://bizerbrain:8080
#     once their container is attached to the 'bizerbrain' network:
#       docker network connect bizerbrain <your-agent-container>
#
# The container serves the app on BOTH port 80 and 8080 internally, so
# http://bizerbrain:8080 works for container-to-container traffic and the
# host's 8080->80 publish works for the SSH tunnel. One URL everywhere.

services:
  bizerbrain:
    image: ghcr.io/kelsi-bizer/bizerbrain:latest
    container_name: bizerbrain
    restart: unless-stopped
    volumes:
      - /srv/bizerbrain/brain:/brain
    ports:
      - "127.0.0.1:8080:80"
    networks:
      - bizerbrain

networks:
  bizerbrain:
    # Fixed name (not <project>_bizerbrain) so the
    # `docker network connect bizerbrain <agent>` command is predictable.
    name: bizerbrain
